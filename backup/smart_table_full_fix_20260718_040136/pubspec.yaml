name: customs_clearance_app
description: Customs clearance Flutter starter app with scalable SQLite architecture.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # SQLite for Android/iOS/macOS.
  sqflite: ^2.4.2

  # Optional desktop support for Windows/Linux/macOS while developing.
  sqflite_common_ffi: ">=2.3.7 <2.4.0"
  sqlite3: ^2.9.4

  path: ^1.9.1
  uuid: ^4.5.3
  shared_preferences: ^2.3.5
  excel: ^4.0.6
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
